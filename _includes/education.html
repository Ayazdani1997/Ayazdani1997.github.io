<div class="page-section bg-gray">
    <div class="container">
        <div class="row">
            <h3 class="section-title">Education</h3>
        </div>
        <div class="row">
            <div class="section-body-container">
                <div class="card-deck">
                    <div class="row div-max-width mx-0">
                        {% for school in site.data.education.schools %}
                            <div class="col-md-6 col-lg-4">
                                <div class="row">
                                    <img class="img-thumbnail mx-auto card-avatar"
                                         src="{{school.image_url | absolute_url }}" alt="Card image">
                                </div>
                                <div class="row image-description-container">
                                    <div class="card-body">
                                        <h5 class="card-title">
                                            {% if school.url %}
                                            <a href="{{school.url | absolute_url}}">
                                             {% endif %}
                                                {{school.name}}
                                             {% if school.url %}
                                            </a>
                                             {% endif %}
                                        </h5>
                                        <div class="image-card-subtitle">{{school.degree}}</div>
                                        <div class="image-card-description">
                                            {{school.field}}
                                        </div>
                                        <div class="image-card-description">
                                            {{school.start_year}} - {{school.end_year}}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
